<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login — Barangay Management</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="card" style="max-width:480px;margin:60px auto">
      <div style="text-align:center;margin-bottom:10px">
        <div style="display:inline-block;background:var(--primary);color:#fff;padding:14px;border-radius:999px">
          <!-- Building icon placeholder -->
          🏢
        </div>
      </div>
      <h2 style="text-align:center;margin:8px 0">Barangay Management System</h2>
      <p class="small" style="text-align:center;margin:0 0 14px">Login to access your dashboard</p>
      <form id="login-form" class="grid">
        <label class="small">Select Role</label>
        <select id="role" class="input" name="role">
          <option value="resident">Resident</option>
          <option value="staff">Staff</option>
          <option value="admin">Admin</option>
        </select>

        <label class="small">Email</label>
          <p id="login-error" style="display:none; color:red; font-size:14px; margin-top:4px;"></p>
        <input id="email" class="input" type="email" placeholder="Enter your email" />

        <button class="btn primary" type="submit">Login</button>

        <div class="footer-note">
          <p class="small"><strong>Demo Accounts:</strong></p>
          <p class="small">Resident: juan@resident.com</p>
          <p class="small">Staff: maria@staff.com</p>
          <p class="small">Admin: pedro@admin.com</p>
        </div>
      </form>
    </div>
  </div>
<script src="main_script.js"></script>
</body>
</html>
